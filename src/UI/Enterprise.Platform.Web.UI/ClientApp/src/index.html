<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Enterprise Platform</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#2563eb" />
    <meta name="description" content="Enterprise Platform — Angular 21 SPA" />

    <!--
      Content Security Policy (static-host baseline).

      Full rationale + directive-by-directive breakdown:
        Docs/Security/csp-policy.md  (Phase 2.2)

      WHY VIA <meta>
        Phase 2 deploys the SPA as a static-host artefact; <meta> is the
        portable way to ship the baseline policy without pinning to any one
        host's header-injection mechanism. When the BFF fronts the SPA
        (Phase 9) the policy is emitted as an HTTP response header with
        per-request nonces, and this <meta> is removed.

      DIRECTIVE NOTES
        - `style-src 'unsafe-inline'` is the only relaxation vs. production.
          PrimeNG's runtime theme engine appends inline <style> nodes; the
          nonce-based BFF path (Phase 9) eliminates this allowance.
        - `connect-src` enumerates the dev + prod hosts we expect to call.
          Add new external fetch targets here AND in csp-policy.md.
        - `report-uri` is intentionally absent — static hosts can't configure
          Report-To and a cross-origin report-uri would itself violate CORS.
          The in-app CspViolationReporterService captures violations via
          the `securitypolicyviolation` DOM event instead.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' http://localhost:* https://api.example.com https://login.microsoftonline.com https://graph.microsoft.com https://*.in.applicationinsights.azure.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; upgrade-insecure-requests"
    />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <link rel="icon" type="image/x-icon" href="favicon.ico" />
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
