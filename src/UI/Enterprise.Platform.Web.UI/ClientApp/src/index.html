<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Enterprise Platform</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- Indigo Blue brand anchor — drives mobile browser chrome / PWA splash. -->
    <meta name="theme-color" content="#1b3f73" />
    <meta name="description" content="Enterprise Platform — Angular 21 SPA" />

    <!--
      Phase 9.B.10 — Content-Security-Policy + X-Content-Type-Options +
      Referrer-Policy are emitted as HTTP response headers by the BFF
      (`BffSecurityHeaders` middleware in Enterprise.Platform.Web.UI). The
      header path is strictly more capable than `<meta>`:
        • `frame-ancestors` works when delivered as a header (browsers
          ignore it via meta — the warning we used to see in console).
        • Header CSP carries a per-request nonce that future inline-script
          use can opt into via `<script nonce="…">` without globally
          relaxing the policy.
        • A single source of truth — see Docs/Security/csp-policy.md for
          the directive-by-directive breakdown.
    -->

    <link rel="icon" type="image/x-icon" href="favicon.ico" />

    <!--
      ─── TYPOGRAPHY ───────────────────────────────────────────────────
      Primary face — Noto Sans (free, SIL OFL). Loaded from Google Fonts
      so we get unicode-range subsets per script (Latin / Cyrillic /
      Greek) automatically — a Latin-only page never downloads the
      Cyrillic or Greek subsets, keeping the first paint cheap.

      `display=swap` paints in the system fallback first, then re-paints
      with Noto Sans when ready (small FOUT, never a FOIT).

      `preconnect` for both googleapis.com (CSS) and gstatic.com (font
      files) saves ~150 ms of TLS handshake before the actual fetch.

      To self-host instead: delete the three <link> tags below + uncomment
      the Noto Sans block in src/styles/_typography.scss. Required if the BFF
      CSP must not list third-party domains (regulated tenants).

      Arno Pro and Bicycletter are commercial typefaces — see
      Docs/Architecture/UI-Typography-Strategy.md for licensing + how to
      drop the WOFF2 files into public/fonts/.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,400;0,500;0,600;0,700;0,900;1,400;1,500;1,600;1,700&display=swap"
    />
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
