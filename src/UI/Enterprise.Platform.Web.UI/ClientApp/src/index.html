    <!--
      Phase 9.B.10 — Content-Security-Policy + X-Content-Type-Options +
      Referrer-Policy are emitted as HTTP response headers by the BFF
      (`BffSecurityHeaders` middleware in Enterprise.Platform.Web.UI). The
      header path is strictly more capable than `<meta>`:
        • `frame-ancestors` works when delivered as a header (browsers
          ignore it via meta — the warning we used to see in console).
        • Header CSP carries a per-request nonce that future inline-script
          use can opt into via `<script nonce="…">` without globally
          relaxing the policy.
        • A single source of truth — see Docs/Security/csp-policy.md for
          the directive-by-directive breakdown.
    -->
