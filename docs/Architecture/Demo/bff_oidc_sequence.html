<style>
.seq-wrap{font-family:var(--font-sans);padding:0 0 1rem}
.stage-nav{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem}
.snav-btn{padding:5px 12px;font-size:12px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-secondary);cursor:pointer;transition:all .15s}
.snav-btn.active{background:var(--color-background-secondary);color:var(--color-text-primary);border-color:var(--color-border-primary);font-weight:500}
.stage-panel{display:none}
.stage-panel.visible{display:block}
.stage-title{font-size:13px;font-weight:500;color:var(--color-text-secondary);margin:0 0 14px;padding:6px 10px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);border-left:2px solid var(--color-border-secondary);border-radius:0}
.lanes{display:grid;gap:0;margin-bottom:8px}
.lane-headers{display:flex;gap:0;margin-bottom:8px}
.lane-hdr{flex:1;text-align:center;font-size:11px;font-weight:500;color:var(--color-text-secondary);padding:5px 2px;border-radius:var(--border-radius-md);background:var(--color-background-secondary);margin:0 3px}
.lane-hdr.browser{background:#E6F1FB;color:#0C447C}
.lane-hdr.bff{background:#E1F5EE;color:#085041}
.lane-hdr.entra{background:#FAEEDA;color:#633806}
.lane-hdr.api{background:#F1EFE8;color:#444441}
.msg-row{display:flex;align-items:center;gap:0;min-height:36px;position:relative;margin-bottom:2px}
.msg-num{width:20px;text-align:right;font-size:10px;color:var(--color-text-tertiary);flex-shrink:0;padding-right:4px}
.msg-line{flex:1;position:relative;display:flex;align-items:center}
.msg-arrow{position:absolute;height:1px;background:var(--color-border-secondary);top:50%}
.msg-arrow.dashed{background:none;border-top:1px dashed var(--color-border-secondary)}
.msg-arrow::after{content:'';position:absolute;right:-1px;top:-4px;border:4px solid transparent;border-left:6px solid var(--color-border-secondary)}
.msg-arrow.dashed::after{border-left-color:var(--color-border-secondary)}
.msg-label{position:absolute;font-size:11px;color:var(--color-text-secondary);white-space:nowrap;top:-14px;background:var(--color-background-primary);padding:0 3px}
.note-row{margin:8px 0 6px;padding:6px 10px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);font-size:11px;color:var(--color-text-secondary);border-left:2px solid var(--color-border-tertiary);border-radius:0}
.self-row{display:flex;align-items:center;gap:6px;margin:4px 0;padding-left:24px}
.self-dot{width:6px;height:6px;border-radius:50%;background:var(--color-border-primary);flex-shrink:0}
.self-txt{font-size:11px;color:var(--color-text-secondary)}
.nav-row{display:flex;justify-content:space-between;align-items:center;margin-top:12px}
.nav-btn{padding:6px 16px;font-size:13px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);cursor:pointer}
.nav-btn:disabled{opacity:0.35;cursor:default}
.stage-counter{font-size:12px;color:var(--color-text-tertiary)}
.ask-btn{font-size:11px;padding:3px 10px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-secondary);cursor:pointer;margin-top:6px}
</style>
<h2 class="sr-only">OIDC authentication sequence across 5 stages: cold load, login click, code exchange, authenticated bootstrap, and first dashboard request.</h2>
<div class="seq-wrap">
<div class="stage-nav" id="snav"></div>
<div id="panels"></div>
<div class="nav-row">
  <button class="nav-btn" id="prev-btn" onclick="navigate(-1)" disabled>← Prev</button>
  <span class="stage-counter" id="counter"></span>
  <button class="nav-btn" id="next-btn" onclick="navigate(1)">Next →</button>
</div>
</div>
<script>
const PARTICIPANTS = ['User','Browser','BFF','Entra','API'];
const COLS = 5;

const STAGES = [
  {
    id:1, label:'Cold load',
    title:'Stage 1 — cold load (no cookie)',
    msgs:[
      {n:1, from:0, to:1, label:'GET https://app.example.com'},
      {n:2, from:1, to:2, label:'GET /'},
      {n:3, from:2, to:1, label:'200 index.html', ret:true},
      {n:4, from:1, to:2, label:'GET /config.json'},
      {n:5, from:2, to:1, label:'200 RuntimeConfig', ret:true},
      {n:6, from:1, to:2, label:'GET /api/auth/session'},
      {n:7, from:2, to:1, label:'200 { isAuthenticated: false }', ret:true},
    ],
    notes:[
      {text:'AuthService.refreshSession() resolves — app initializer finishes'},
      {self:true, text:'Router.navigate(\'/dashboard\') → authGuard sees unauthenticated → navigate(/auth/login)'},
    ],
    ask:'What does AuthService.refreshSession() do during app initialisation?',
  },
  {
    id:2, label:'Login click',
    title:'Stage 2 — login click',
    msgs:[
      {n:8, from:0, to:1, label:'clicks "Sign in"'},
      {n:9, from:1, to:2, label:'top-level GET /api/auth/login (not XHR)'},
      {n:10, from:2, to:1, label:'302 → /authorize?code_challenge=...', ret:true, dashed:true},
      {n:11, from:1, to:3, label:'GET /authorize (top-level nav)'},
      {n:12, from:3, to:1, label:'prompt credentials + consent', ret:true},
      {n:13, from:0, to:3, label:'signs in'},
      {n:14, from:3, to:1, label:'302 form_post → /signin-oidc (with code)', ret:true, dashed:true},
    ],
    notes:[],
    ask:'Why is /api/auth/login a top-level navigation and not an XHR call?',
  },
  {
    id:3, label:'Code exchange',
    title:'Stage 3 — code exchange (server-side)',
    msgs:[
      {n:15, from:1, to:2, label:'POST /signin-oidc {code, state}'},
      {n:16, from:2, to:3, label:'POST /token grant_type=authorization_code + code_verifier'},
      {n:17, from:3, to:2, label:'200 { id_token, access_token, refresh_token }', ret:true},
    ],
    notes:[
      {self:true, text:'BFF: SaveTokens=true → issues encrypted cookie ticket'},
      {self:true, text:'Set-Cookie: ep.bff.session (HttpOnly, Secure, SameSite=Strict)'},
      {n:18, from:2, to:1, label:'302 → / (origin)', ret:true, dashed:true, inline:true},
    ],
    ask:'What does SaveTokens=true do and where are the tokens stored on the server?',
  },
  {
    id:4, label:'Auth bootstrap',
    title:'Stage 4 — authenticated bootstrap',
    msgs:[
      {n:19, from:1, to:2, label:'GET / (cookie attached)'},
      {n:20, from:2, to:1, label:'200 index.html', ret:true},
      {n:21, from:1, to:2, label:'GET /api/auth/session (cookie)'},
      {n:22, from:2, to:1, label:'200 { isAuthenticated:true, name, email, roles, expiresAt }', ret:true},
      {n:23, from:1, to:2, label:'GET /api/antiforgery/token'},
      {n:24, from:2, to:1, label:'200 + Set-Cookie: XSRF-TOKEN (readable)', ret:true},
    ],
    notes:[
      {self:true, text:'AuthStore hydrates permissions'},
      {self:true, text:'Router.navigate(\'/dashboard\') — authGuard passes'},
    ],
    ask:'How does AuthStore hydrate permissions from the session response?',
  },
  {
    id:5, label:'Dashboard',
    title:'Stage 5 — first dashboard request',
    msgs:[
      {n:25, from:1, to:2, label:'GET /api/proxy/v1/dashboard (cookie + X-XSRF-TOKEN)'},
    ],
    notes:[
      {self:true, text:'BFF: AutoValidateAntiforgery — verifies double-submit cookie'},
      {self:true, text:'BFF: GetTokenAsync(\'access_token\') from cookie ticket'},
      {n:26, from:2, to:4, label:'GET /v1/dashboard — Authorization: Bearer eyJ...', inline:true},
      {n:27, from:4, to:2, label:'200 [DTO]', ret:true, inline:true},
      {n:28, from:2, to:1, label:'200 [DTO]', ret:true, inline:true},
      {n:29, from:0, to:0, label:'', render:false},
    ],
    renderFinal:{text:'renders Dashboard'},
    ask:'What does AutoValidateAntiforgery check and what attack does it prevent?',
  },
];

function colCenter(c, total, w) {
  const cellW = w / total;
  return cellW * c + cellW / 2;
}

function buildPanel(stage) {
  const W = 620;
  const participantCount = PARTICIPANTS.length;
  const cellW = W / participantCount;

  let html = `<div class="stage-panel" id="panel-${stage.id}">`;
  html += `<div class="stage-title">${stage.title}</div>`;

  html += `<div style="overflow-x:auto"><svg width="100%" viewBox="0 0 ${W} ${computeHeight(stage)}" style="display:block">`;

  const headerY = 16;
  const headerH = 26;
  const laneColors = ['#F1EFE8','#E6F1FB','#E1F5EE','#FAEEDA','#F1EFE8'];
  const textColors = ['#444441','#0C447C','#085041','#633806','#444441'];

  PARTICIPANTS.forEach((p, i) => {
    const x = cellW * i;
    html += `<rect x="${x+2}" y="${headerY}" width="${cellW-4}" height="${headerH}" rx="4" fill="${laneColors[i]}" stroke="none"/>`;
    html += `<text x="${x+cellW/2}" y="${headerY+13}" text-anchor="middle" dominant-baseline="central" style="font-size:11px;font-weight:500;fill:${textColors[i]};font-family:var(--font-sans)">${p}</text>`;
  });

  const lifelineY = headerY + headerH;
  PARTICIPANTS.forEach((p, i) => {
    const x = cellW * i + cellW / 2;
    html += `<line x1="${x}" y1="${lifelineY}" x2="${x}" y2="${computeHeight(stage)-10}" stroke="var(--color-border-tertiary)" stroke-width="0.5" stroke-dasharray="3 3"/>`;
  });

  let curY = lifelineY + 14;

  const allItems = buildItems(stage);

  allItems.forEach(item => {
    if (item.type === 'msg') {
      const {n, from, to, label, ret, dashed} = item;
      const x1 = cellW * from + cellW / 2;
      const x2 = cellW * to + cellW / 2;
      const y = curY + 18;
      const minX = Math.min(x1, x2);
      const maxX = Math.max(x1, x2);
      const isLeft = x2 < x1;
      const dashAttr = dashed || ret ? 'stroke-dasharray="4 3"' : '';
      const col = ret ? '#888780' : '#185FA5';

      html += `<text x="16" y="${y}" text-anchor="start" dominant-baseline="central" style="font-size:10px;fill:var(--color-text-tertiary);font-family:var(--font-sans)">${n}</text>`;

      if (from === to) {
        html += `<path d="M${x1} ${y} Q${x1+30} ${y} ${x1+30} ${y+10} Q${x1+30} ${y+20} ${x1} ${y+20}" fill="none" stroke="${col}" stroke-width="0.75" ${dashAttr}/>`;
        html += `<polygon points="${x1},${y+17} ${x1-4},${y+22} ${x1+4},${y+22}" fill="${col}"/>`;
      } else {
        html += `<line x1="${x1}" y1="${y}" x2="${isLeft ? x2+6 : x2-6}" y2="${y}" stroke="${col}" stroke-width="0.75" ${dashAttr} marker-end="url(#arr${ret?'r':'f'})"/>`;
      }

      if (label) {
        const midX = (x1 + x2) / 2;
        const truncated = label.length > 42 ? label.slice(0, 41) + '…' : label;
        html += `<text x="${midX}" y="${y - 5}" text-anchor="middle" dominant-baseline="auto" style="font-size:10px;fill:var(--color-text-secondary);font-family:var(--font-sans)">${truncated}</text>`;
      }
      curY += 36;
    } else if (item.type === 'note') {
      html += `<rect x="30" y="${curY}" width="${W-60}" height="22" rx="3" fill="var(--color-background-secondary)" stroke="none"/>`;
      html += `<text x="${W/2}" y="${curY+11}" text-anchor="middle" dominant-baseline="central" style="font-size:10px;fill:var(--color-text-secondary);font-family:var(--font-sans)">${item.text}</text>`;
      curY += 28;
    }
  });

  html += `<defs>
    <marker id="arrf" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#185FA5" stroke-width="1.5"/></marker>
    <marker id="arrr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5"/></marker>
  </defs>`;
  html += `</svg></div>`;

  if (stage.ask) {
    html += `<button class="ask-btn" onclick="sendPrompt('${stage.ask.replace(/'/g,"\\'")}')">Ask: ${stage.ask} ↗</button>`;
  }
  html += `</div>`;
  return html;
}

function buildItems(stage) {
  const items = [];
  stage.msgs.forEach(m => {
    if (m.render === false) return;
    items.push({type:'msg', ...m});
  });
  stage.notes.forEach(n => {
    if (n.self) {
      items.push({type:'note', text:n.text});
    } else if (n.inline) {
    } else {
      items.push({type:'note', text:n.text});
    }
  });
  if (stage.renderFinal) {
    items.push({type:'note', text:stage.renderFinal.text});
  }
  return items;
}

function computeHeight(stage) {
  let h = 16 + 26 + 14;
  const items = buildItems(stage);
  items.forEach(item => {
    if (item.type === 'msg') h += 36;
    else if (item.type === 'note') h += 28;
  });
  return h + 20;
}

let current = 0;

function render() {
  const panelsEl = document.getElementById('panels');
  const snapEl = document.getElementById('snav');
  panelsEl.innerHTML = '';
  snapEl.innerHTML = '';
  STAGES.forEach((s, i) => {
    panelsEl.innerHTML += buildPanel(s);
    const btn = document.createElement('button');
    btn.className = 'snav-btn' + (i === 0 ? ' active' : '');
    btn.textContent = `${s.id}. ${s.label}`;
    btn.onclick = () => goTo(i);
    snapEl.appendChild(btn);
  });
  showStage(0);
}

function showStage(idx) {
  current = idx;
  STAGES.forEach((s, i) => {
    const p = document.getElementById(`panel-${s.id}`);
    if (p) p.className = 'stage-panel' + (i === idx ? ' visible' : '');
  });
  document.querySelectorAll('.snav-btn').forEach((b, i) => {
    b.className = 'snav-btn' + (i === idx ? ' active' : '');
  });
  document.getElementById('prev-btn').disabled = idx === 0;
  document.getElementById('next-btn').disabled = idx === STAGES.length - 1;
  document.getElementById('counter').textContent = `${idx + 1} / ${STAGES.length}`;
}

function goTo(idx) { showStage(idx); }
function navigate(dir) { showStage(Math.max(0, Math.min(STAGES.length - 1, current + dir))); }

render();
</script>
