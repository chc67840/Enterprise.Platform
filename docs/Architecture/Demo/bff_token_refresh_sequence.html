<style>
.sq4{font-family:var(--font-sans);padding:0 0 1rem}
.sq4-hdr{font-size:12px;font-weight:500;color:var(--color-text-secondary);padding:5px 10px;background:var(--color-background-secondary);border-left:2px solid var(--color-border-secondary);margin-bottom:14px}
.sq4-tabs{display:flex;gap:6px;margin-bottom:12px}
.sq4-tab{padding:4px 12px;font-size:11px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-secondary);cursor:pointer}
.sq4-tab.on{background:var(--color-background-secondary);color:var(--color-text-primary);font-weight:500;border-color:var(--color-border-primary)}
.sq4-panel{display:none}
.sq4-panel.vis{display:block}
.sq4-ask{font-size:11px;padding:3px 10px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-secondary);cursor:pointer;margin-top:10px;margin-right:6px;display:inline-block}
</style>
<div class="sq4">
<div class="sq4-hdr">Token validation — three paths through OnValidatePrincipal</div>
<div class="sq4-tabs">
  <button class="sq4-tab on" onclick="sq4show(0)">Path A — token fresh</button>
  <button class="sq4-tab"    onclick="sq4show(1)">Path B — refresh needed</button>
  <button class="sq4-tab"    onclick="sq4show(2)">Path C — refresh rejected</button>
</div>
<div id="sq4panels"></div>
</div>
<script>
const W4 = 640;
const PARTS4 = [
  {l:'Browser',    fill:'#E6F1FB', tc:'#0C447C'},
  {l:'BFF',        fill:'#E1F5EE', tc:'#085041'},
  {l:'Cookie scheme', fill:'#EEEDFE', tc:'#3C3489'},
  {l:'TokenRefreshSvc', fill:'#EEEDFE', tc:'#3C3489'},
  {l:'Entra v2',   fill:'#FAEEDA', tc:'#633806'},
];
const N4 = PARTS4.length;
const CW4 = W4 / N4;
const cx4 = i => CW4*i + CW4/2;

const shared = [
  {n:1, f:0, t:1, l:'GET / (cookie attached)'},
  {n:2, f:1, t:2, l:'AuthenticateAsync(ep.bff)'},
  {self:true, at:2, l:'decrypt ticket → OnValidatePrincipal fires'},
  {n:3, f:2, t:3, l:'ValidateAsync(ctx)'},
  {self:true, at:3, l:'peek access_token expiry'},
];

const PATHS = [
  {
    branch:'[access_token still fresh]',
    bfill:'#E1F5EE', btc:'#085041',
    msgs:[
      {ret:true, f:3, t:2, l:'no-op', dashed:true},
    ],
    after:[
      {n:4, f:1, t:0, l:'200 index.html', ret:true, dashed:true},
      {n:5, f:0, t:1, l:'GET /api/auth/session'},
      {n:6, f:1, t:0, l:'200 SessionInfo (isAuthenticated:true)', ret:true, dashed:true},
    ],
    note:'Bootstrap completes in <100ms — no Entra round-trip.',
    ask:'How do you set the refresh window — what is a good threshold before access_token expiry to trigger proactive refresh?',
  },
  {
    branch:'[access_token within refresh window]',
    bfill:'#FAEEDA', btc:'#633806',
    msgs:[
      {n:4, f:3, t:4, l:'POST /token grant_type=refresh_token'},
      {ret:true, f:4, t:3, l:'200 new access_token + refresh_token', dashed:true},
      {self:true, at:3, l:'rotate tokens in ticket'},
      {f:3, t:2, l:'RenewAsync() — reissue cookie ticket', dashed:false},
    ],
    after:[
      {n:5, f:1, t:0, l:'200 index.html', ret:true, dashed:true},
      {n:6, f:0, t:1, l:'GET /api/auth/session'},
      {n:7, f:1, t:0, l:'200 SessionInfo (fresh tokens)', ret:true, dashed:true},
    ],
    note:'Cookie ticket reissued with new tokens — client sees no interruption.',
    ask:'How does RenewAsync() reissue the cookie — does it write a new Set-Cookie header on the current response?',
  },
  {
    branch:'[refresh_token rejected by Entra]',
    bfill:'#FCEBEB', btc:'#A32D2D',
    msgs:[
      {n:4, f:3, t:4, l:'POST /token grant_type=refresh_token'},
      {ret:true, f:4, t:3, l:'400 invalid_grant', dashed:true, err:true},
      {f:3, t:2, l:'RejectPrincipal()', err:true},
    ],
    after:[
      {f:1, t:0, l:'401 Unauthorized', ret:true, dashed:true, err:true},
      {self:true, at:0, l:'errorInterceptor catches 401 → window.location = /api/auth/login', err:true},
    ],
    note:'User is silently re-driven through the full OIDC login flow.',
    ask:'How should errorInterceptor distinguish a 401 from an expired session vs a 401 from a permission failure on a specific API call?',
  },
];

function buildPath(path) {
  const msgs = [...shared, ...path.msgs, ...path.after];

  let h = 52;
  msgs.forEach(m => { h += m.self ? 28 : 36; });
  if (path.note) h += 32;
  h += 20;

  let s = `<svg width="100%" viewBox="0 0 ${W4} ${h}" style="display:block">`;
  s += `<defs>
    <marker id="paf" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#185FA5" stroke-width="1.5"/></marker>
    <marker id="par" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5"/></marker>
    <marker id="perr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#E24B4A" stroke-width="1.5"/></marker>
    <marker id="pok" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#0F6E56" stroke-width="1.5"/></marker>
  </defs>`;

  PARTS4.forEach((p, i) => {
    s += `<rect x="${CW4*i+2}" y="8" width="${CW4-4}" height="24" rx="4" fill="${p.fill}" stroke="none"/>`;
    s += `<text x="${cx4(i)}" y="20" text-anchor="middle" dominant-baseline="central" style="font-size:10px;font-weight:500;fill:${p.tc};font-family:var(--font-sans)">${p.l}</text>`;
  });
  PARTS4.forEach((_, i) => {
    s += `<line x1="${cx4(i)}" y1="32" x2="${cx4(i)}" y2="${h-8}" stroke="var(--color-border-tertiary)" stroke-width="0.5" stroke-dasharray="3 3"/>`;
  });

  let branchDrawn = false;
  let y = 46;

  msgs.forEach((m, idx) => {
    const isShared = idx < shared.length;
    const isBranchStart = idx === shared.length;

    if (isBranchStart && !branchDrawn) {
      s += `<rect x="2" y="${y}" width="${W4-4}" height="14" rx="2" fill="${path.bfill}" stroke="none"/>`;
      s += `<text x="${W4/2}" y="${y+7}" text-anchor="middle" dominant-baseline="central" style="font-size:9px;font-weight:500;fill:${path.btc};font-family:var(--font-sans)">${path.branch}</text>`;
      y += 14;
      branchDrawn = true;
    }

    if (m.self) {
      const x = cx4(m.at);
      const bgFill = m.err ? '#FCEBEB' : 'var(--color-background-secondary)';
      const tc = m.err ? '#A32D2D' : 'var(--color-text-secondary)';
      s += `<rect x="${x-CW4/2+4}" y="${y}" width="${CW4-8}" height="20" rx="3" fill="${bgFill}" stroke="none"/>`;
      s += `<text x="${x}" y="${y+10}" text-anchor="middle" dominant-baseline="central" style="font-size:9px;fill:${tc};font-family:var(--font-sans)">${m.l}</text>`;
      y += 28;
    } else {
      const x1 = cx4(m.f), x2 = cx4(m.t);
      const isLeft = x2 < x1;
      const mid = (x1+x2)/2;
      const col = m.err ? '#E24B4A' : (m.ret ? '#888780' : '#185FA5');
      const mk = m.err ? 'perr' : (m.ret ? 'par' : 'paf');
      const dash = (m.dashed||m.ret) ? 'stroke-dasharray="4 3"' : '';
      const lx2 = isLeft ? x2+5 : x2-5;
      const lbl = m.l ? (m.l.length>46 ? m.l.slice(0,45)+'…' : m.l) : '';

      if (m.n) s += `<text x="0" y="${y+5}" style="font-size:9px;fill:var(--color-text-tertiary);font-family:var(--font-sans)">${m.n}</text>`;
      if (lbl) s += `<text x="${mid}" y="${y+2}" text-anchor="middle" style="font-size:9px;fill:${m.err?'#A32D2D':'var(--color-text-secondary)'};font-family:var(--font-sans)">${lbl}</text>`;
      s += `<line x1="${x1}" y1="${y+14}" x2="${lx2}" y2="${y+14}" stroke="${col}" stroke-width="0.75" ${dash} marker-end="url(#${mk})"/>`;
      y += 36;
    }
  });

  if (path.note) {
    s += `<rect x="2" y="${y}" width="${W4-4}" height="24" rx="4" fill="var(--color-background-secondary)" stroke="var(--color-border-secondary)" stroke-width="0.5"/>`;
    s += `<text x="${W4/2}" y="${y+12}" text-anchor="middle" dominant-baseline="central" style="font-size:9px;fill:var(--color-text-secondary);font-family:var(--font-sans)">${path.note}</text>`;
  }

  s += `</svg>`;
  return s;
}

function sq4show(idx) {
  document.querySelectorAll('.sq4-tab').forEach((b,i) => b.className='sq4-tab'+(i===idx?' on':''));
  document.querySelectorAll('.sq4-panel').forEach((p,i) => p.className='sq4-panel'+(i===idx?' vis':''));
}

const container = document.getElementById('sq4panels');
PATHS.forEach((p, i) => {
  const div = document.createElement('div');
  div.className = 'sq4-panel'+(i===0?' vis':'');
  div.innerHTML = buildPath(p);
  if (p.ask) {
    const btn = document.createElement('button');
    btn.className = 'sq4-ask';
    btn.textContent = `Ask: ${p.ask} ↗`;
    btn.onclick = () => sendPrompt(p.ask);
    div.appendChild(btn);
  }
  container.appendChild(div);
});
</script>
